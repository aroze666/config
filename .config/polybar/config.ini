[colors]
background = #50000000
background-alt = #30000000
foreground = #ffff00
primary = #ffff00
secondary = #00ffff
alert = #ff0000
disabled = #ff0000

[bar/example]
width = 100%
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000
 
padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

font-0 = monospace:size=14;1
font-1 = firacode nerd font:size=14;1

modules-left = 
modules-center = xworkspaces
modules-right = pulseaudio date
cursor-click = pointer

cursor-scroll = ns-resize

enable-ipc = true

tray-position = left

; wm-restack = generic
; wm-restack = bspwm
 wm-restack = i3
 override-redirect = true

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP0
ramp-capacity-0 = у°Ғә 
ramp-capacity-1 = у°ҒҪ
ramp-capacity-2 = у°Ғҝ
ramp-capacity-3 = у°ӮҒ
ramp-capacity-4 = у°Ғ№
label-charging-foreground = #aaffaa
label-discharging-foreground = #ffaaaa
format-discharging = <ramp-capacity> <label-discharging>
format-charging = у°Ӯ„ <label-charging>
poll-interval = 1

[module/sleep]
type = custom/script
exec = uname -r
format-foreground = ${colors.primary}
click-left = systemctl suspend

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = #ff5500
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
#click-right = pavucontrol
ramp-volume-0 = п©ҫ
ramp-volume-1 = п©ҝ
ramp-volume-2 = п©Ҫ
label-muted = у°–Ғ
format-volume = <ramp-volume> <label-volume>
label-volume-foreground = #aaaaff
label-muted-foreground = #ffaaaa

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = у°ғ® %m/%d/%Y | пҖ— %H:%M:%S


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
